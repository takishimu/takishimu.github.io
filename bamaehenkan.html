        let currentNovelIndex = 0;

        const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

        function renderYearList(year) {
            const container = document.getElementById('year' + year + 'Content');
            container.innerHTML = '';

            for (let m = 1; m <= 12; m++) {
                const monthStr = m.toString().padStart(2, '0');
                const monthNovels = novels.filter(n => n.year === year && n.month === monthStr);

                if (monthNovels.length === 0) continue;

                const monthHeader = document.createElement('div');
                monthHeader.className = 'month-header';
                monthHeader.innerHTML = `${monthNames[m-1]} <span id="arrow${year}${monthStr}">▼</span>`;
                monthHeader.onclick = () => toggleMonth(year, monthStr);
                container.appendChild(monthHeader);

                const monthContent = document.createElement('div');
                monthContent.className = 'month-content';
                monthContent.id = `month${year}${monthStr}Content`;

                const novelList = document.createElement('div');
                novelList.className = 'novel-list';

                monthNovels.forEach(novel => {
                    const idx = novels.findIndex(n => n.id === novel.id);
                    
                    const item = document.createElement('div');
                    item.className = 'novel-item';

                    const link = document.createElement('a');
                    link.href = "#";
                    link.textContent = novel.title;
                    link.onclick = (e) => {
                        e.preventDefault();
                        showPasswordForNovel(idx);
                    };
                    if (idx === currentNovelIndex) link.classList.add('active');

                    const synopsis = document.createElement('div');
                    synopsis.className = 'synopsis-preview';
                    synopsis.innerHTML = (novel.synopsis || 'あらすじは準備中です。').replace(/\n/g, '<br>');

                    item.appendChild(link);
                    item.appendChild(synopsis);
                    novelList.appendChild(item);
                });

                monthContent.appendChild(novelList);
                container.appendChild(monthContent);
            }

        function toggleYear(year) {
            const content = document.getElementById('year' + year + 'Content');
            const arrow = document.getElementById('arrow' + year);
            if (content) {
                content.classList.toggle('active');
                arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
        }

        function toggleMonth(year, month) {
            const content = document.getElementById(`month${year}${month}Content`);
            const arrow = document.getElementById(`arrow${year}${month}`);
            if (content) {
                content.classList.toggle('active');
                arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
        }

        function showPasswordForNovel(index) {
            const novel = novels[index];

                loadSelectedNovel();
                return;

            document.getElementById('passwordScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordError').textContent = '';
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const novel = novels[pendingNovelIndex];

                document.getElementById('passwordScreen').style.display = 'none';
                currentNovelIndex = pendingNovelIndex;
                loadSelectedNovel();
            } else {
                document.getElementById('passwordError').textContent = "パスワードが違います";
