            ['2023','2024','2025','2026'].forEach(year => renderYearList(year));
            
            document.getElementById('year2023Content').classList.remove('active');
            document.getElementById('year2024Content').classList.remove('active');
            document.getElementById('year2025Content').classList.remove('active');
            document.getElementById('year2026Content').classList.remove('active');

            document.getElementById('arrow2023').textContent = '▼';
            document.getElementById('arrow2024').textContent = '▼';
            document.getElementById('arrow2025').textContent = '▼';
            document.getElementById('arrow2026').textContent = '▼';
        };
    </script>
</body>
</html>
