        function renderYearList(year) {
            const container = document.getElementById('year' + year + 'Content');
            container.innerHTML = '';

            for (let m = 1; m <= 12; m++) {
                const monthStr = m.toString().padStart(2, '0');
                const monthNovels = novels.filter(n => n.year === year && n.month === monthStr);

                if (monthNovels.length === 0) continue;

                const monthHeader = document.createElement('div');
                monthHeader.className = 'month-header';
                monthHeader.innerHTML = `${monthNames[m-1]} <span id="arrow${year}${monthStr}">▼</span>`;
                monthHeader.onclick = () => toggleMonth(year, monthStr);
                container.appendChild(monthHeader);

                const monthContent = document.createElement('div');
                monthContent.className = 'month-content';
                monthContent.id = `month${year}${monthStr}Content`;

                const novelList = document.createElement('div');
                novelList.className = 'novel-list';

                monthNovels.forEach(novel => {
                    const idx = novels.findIndex(n => n.id === novel.id);
                    
                    const item = document.createElement('div');
                    item.className = 'novel-item';

                    const link = document.createElement('a');
                    link.href = "#";
                    link.textContent = novel.title;
                    link.onclick = (e) => {
                        e.preventDefault();
                        showPasswordForNovel(idx);
                    };
                    if (idx === currentNovelIndex) link.classList.add('active');

synopsis.className = 'synopsis-preview';

        function toggleYear(year) {

                arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
        }

        function toggleMonth(year, month) {
            const content = document.getElementById(`month${year}${month}Content`);
            const arrow = document.getElementById(`arrow${year}${month}`);
            if (content) {
                content.classList.toggle('active');
                arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
