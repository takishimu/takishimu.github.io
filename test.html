<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文</title>
    <style>
        body { font-family: "メイリオ", sans-serif; background: #f8f0f8; color: #333; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1300px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; }
        .left-sidebar { flex: 1; min-width: 380px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .preview-area { flex: 2; min-width: 400px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        h1 { text-align: center; color: #8b008b; margin-bottom: 15px; }
        h2 { color: #8b008b; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 8px; }

        .year-header, .month-header {
            font-size: 18px; font-weight: bold; color: #8b008b; padding: 12px 15px; background: #f9e8f9;
            border-radius: 6px; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .year-header:hover, .month-header:hover { background: #f0d0f0; }

        .year-content, .month-content { display: none; padding-left: 15px; margin-bottom: 15px; }
        .year-content.active, .month-content.active { display: block; }

        .novel-item { margin-bottom: 22px; }

        .novel-list a {
            display: block; padding: 14px 16px; color: white; text-decoration: none; border-radius: 8px;
            font-weight: bold; background: #8b008b; border: 2px solid #8b008b; margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .novel-list a:hover { background: #c026d3; border-color: #c026d3; transform: translateX(6px); }

        .synopsis-preview {
            margin-top: 8px; padding: 12px 16px; background: #f9e8f9; border-left: 5px solid #8b008b;
            border-radius: 6px; font-size: 14.5px; color: #555; line-height: 1.6;
        }

        .novel {
            white-space: pre-wrap; font-size: 16px; background: #fffaf0; padding: 25px;
            border: 1px solid #ddd; border-radius: 8px; min-height: 450px; line-height: 1.8;
        }
    </style>
</head>
<body>
    <h1>夢小説閲覧サイト</h1>
    <p style="text-align:center;">小説のタイトルをクリックすると本文が表示されます</p>

    <div class="container">
        <div class="left-sidebar">
            <h2>📅 年別一覧</h2>
            
            <div class="year-header" onclick="toggleYear('2023')">2023年 <span id="arrow_2023">▼</span></div>
            <div class="year-content" id="year_2023"></div>

            <div class="year-header" onclick="toggleYear('2024')">2024年 <span id="arrow_2024">▼</span></div>
            <div class="year-content" id="year_2024"></div>

            <div class="year-header" onclick="toggleYear('2025')">2025年 <span id="arrow_2025">▼</span></div>
            <div class="year-content" id="year_2025"></div>

            <div class="year-header" onclick="toggleYear('2026')">2026年 <span id="arrow_2026">▼</span></div>
            <div class="year-content" id="year_2026"></div>
        </div>

        <div class="preview-area">
            <h2 id="currentTitle">小説本文</h2>
            <div id="result" class="novel">
                左側のタイトルをクリックすると、ここに本文が表示されます。
            </div>
        </div>
    </div>

    <!-- パスワード画面 -->
    <div id="passwordScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 380px; width: 90%;">
            <h2 id="passwordTitle">この小説を表示するには<br>パスワードを入力してください</h2>
            <input type="password" id="passwordInput" placeholder="パスワード" style="width:100%; padding:12px; margin:15px 0; font-size:18px;">
            <button onclick="checkPassword()" style="width:100%; padding:12px;">表示する</button>
            <div id="passwordError" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <!-- 小説データ読み込み -->
    <script src="2023_bun.html"></script>
    <script src="2024_bun.html"></script>

    <script>
        // novels-data.js からデータを取得（let を var に変更して重複を回避）
        let novels = window.novelsData || [];

        function renderYearList(year) {
            const container = document.getElementById('year_' + year);
            container.innerHTML = '';

            for (let m = 1; m <= 12; m++) {
                const monthStr = m.toString().padStart(2, '0');
                const monthNovels = novels.filter(n => n.year === year && n.month === monthStr);

                if (monthNovels.length === 0) continue;

                const monthHeader = document.createElement('div');
                monthHeader.className = 'month-header';
                monthHeader.innerHTML = m + '月 <span id="arrow_' + year + '_' + monthStr + '">▼</span>';
                monthHeader.onclick = () => toggleMonth(year, monthStr);
                container.appendChild(monthHeader);

                const monthContent = document.createElement('div');
                monthContent.className = 'month-content';
                monthContent.id = 'month_' + year + '_' + monthStr;

                const novelList = document.createElement('div');
                novelList.className = 'novel-list';

                monthNovels.forEach(novel => {
                    const item = document.createElement('div');
                    item.className = 'novel-item';

                    const link = document.createElement('a');
                    link.href = "#";
                    link.textContent = novel.title;
                    link.onclick = (e) => { 
                        e.preventDefault(); 
                        showNovel(novels.indexOf(novel)); 
                    };

                    const synopsisDiv = document.createElement('div');
                    synopsisDiv.className = 'synopsis-preview';
                    synopsisDiv.innerHTML = (novel.synopsis || 'あらすじは準備中です。').replace(/\n/g, '<br>');

                    item.appendChild(link);
                    item.appendChild(synopsisDiv);
                    novelList.appendChild(item);
                });

                monthContent.appendChild(novelList);
                container.appendChild(monthContent);
            }
        }

        function toggleYear(year) {
            const content = document.getElementById('year_' + year);
            const arrow = document.getElementById('arrow_' + year);
            if (content) {
                content.classList.toggle('active');
                if (arrow) arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
        }

        function toggleMonth(year, month) {
            const content = document.getElementById('month_' + year + '_' + month);
            const arrow = document.getElementById('arrow_' + year + '_' + month);
            if (content) {
                content.classList.toggle('active');
                if (arrow) arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
            }
        }

        function showNovel(index) {
            const novel = novels[index];
            if (!novel) return;

            document.getElementById('currentTitle').textContent = novel.title;

            if (novel.password) {
                showPasswordForNovel(index);
                return;
            }

            document.getElementById('result').innerHTML = (novel.template || '').replace(/\n/g, '<br>');
        }

        function showPasswordForNovel(index) {
            const novel = novels[index];
            document.getElementById('passwordTitle').innerHTML = `${novel.title}<br>を表示するには<br>パスワードを入力してください`;
            document.getElementById('passwordScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordError').textContent = '';
            window.pendingIndex = index;
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const novel = novels[window.pendingIndex];
            if (input === novel.password) {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('result').innerHTML = (novel.template || '').replace(/\n/g, '<br>');
            } else {
                document.getElementById('passwordError').textContent = "パスワードが違います";
            }
        }

        // 初期化
        window.onload = function() {
            ['2023','2024','2025','2026'].forEach(year => renderYearList(year));
            document.querySelectorAll('.year-content').forEach(el => el.classList.remove('active'));
            ['2023','2024','2025','2026'].forEach(y => {
                const arrow = document.getElementById('arrow_' + y);
                if (arrow) arrow.textContent = '▼';
            });
        };
    </script>
</body>
</html>
